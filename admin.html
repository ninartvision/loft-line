<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Loft Line</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Georgian:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dark: #111111;
      --dark2: #1c1c1c;
      --gold: #c8a879;
      --gold-hover: #d4b78e;
      --text: #e0e0e0;
      --muted: #888888;
      --border: #2a2a2a;
    }

    body {
      font-family: 'Inter', 'Noto Sans Georgian', system-ui, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .admin-panel {
      text-align: center;
      max-width: 480px;
      padding: 48px 40px;
      background: var(--dark2);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .admin-logo {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .admin-subtitle {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 36px;
    }

    .admin-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      background: var(--gold);
      color: var(--dark);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .admin-btn:hover {
      background: var(--gold-hover);
      transform: translateY(-1px);
    }

    .admin-btn:active {
      transform: translateY(0);
    }

    .admin-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .admin-back {
      display: inline-block;
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .admin-back:hover {
      color: var(--text);
    }

    .admin-hint {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="admin-panel">
    <div class="admin-logo">LOFT LINE</div>
    <div class="admin-subtitle">ადმინ პანელი</div>

    <a href="https://8t5h923j.sanity.studio/"
       target="_blank"
       rel="noopener noreferrer"
       class="admin-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open Sanity Admin Dashboard
    </a>

    <a href="index.html" class="admin-back">← მთავარ გვერდზე დაბრუნება</a>

    <div class="admin-hint">
      ამ გვერდზე წვდომა მხოლოდ <strong>Ctrl + Shift + A</strong> კომბინაციით არის შესაძლებელი.
    </div>
  </div>
</body>
</html>
