<!-- Loft-style Responsive Header for Loft Line -->
<header class="loft-header">
  <div class="loft-header-inner">
    <div class="loft-header-left">
      <span class="loft-logo">Loft Line</span>
    </div>
    <nav class="loft-header-center" id="loftNav">
      <a href="#">HOME</a>
      <a href="#">SHOP</a>
      <a href="#">COLLECTIONS</a>
      <a href="#">ABOUT</a>
      <a href="#">CONTACT</a>
    </nav>
    <div class="loft-header-right">
      <button class="loft-icon-btn" aria-label="Search">
        <span class="loft-icon-search"></span>
      </button>
      <div class="loft-lang-switcher" role="group" aria-label="Language switcher">
        <button type="button" class="loft-lang-btn active" data-lang="ka">KA</button>
        <button type="button" class="loft-lang-btn" data-lang="en">EN</button>
      </div>
      <button class="loft-icon-btn" aria-label="Cart">
        <span class="loft-icon-cart"></span>
        <span class="loft-cart-badge">2</span>
      </button>
      <button class="loft-hamburger" id="loftHamburger" aria-label="Menu">
        <span class="loft-hamburger-icon"><span></span></span>
      </button>
    </div>
  </div>
  <div class="loft-mobile-menu" id="loftMobileMenu">
    <div class="loft-mobile-menu-header">
      <span class="loft-mobile-logo">Loft Line</span>
      <button class="loft-mobile-close" id="loftMobileClose" aria-label="Close">×</button>
    </div>
    <nav class="loft-mobile-nav">
      <a href="#">HOME</a>
      <a href="#">SHOP</a>
      <a href="#">COLLECTIONS</a>
      <a href="#">ABOUT</a>
      <a href="#">CONTACT</a>
    </nav>
  </div>
</header>
